# ==============================================================================
# sonar-project.properties
# ------------------------------------------------------------------------------
# Enterprise SonarQube / SonarCloud configuration for the data platform.
#
# Usage examples:
#   sonar-scanner \
#     -Dsonar.host.url=${SONAR_HOST_URL} \
#     -Dsonar.token=${SONAR_TOKEN}
#
# CI/CD should inject secrets through environment variables.
# Do not store sonar tokens in this file.
# ==============================================================================


# ==============================================================================
# PROJECT IDENTITY
# ==============================================================================
sonar.projectKey=data-platform
sonar.projectName=Enterprise Data Platform
sonar.projectDescription=Enterprise-grade modular data platform for ingestion, processing, validation, quality, governance, security, observability, orchestration and AI-enabled workflows.
sonar.projectVersion=1.0.0

# For SonarCloud, uncomment and set your organization key:
# sonar.organization=your-organization


# ==============================================================================
# SOURCE / TEST LAYOUT
# ==============================================================================
sonar.sources=data
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.language=py

# Python version used by the project. Keep aligned with setup.py / pyproject.toml.
sonar.python.version=3.10,3.11,3.12,3.13


# ==============================================================================
# COVERAGE / TEST REPORTS
# ==============================================================================
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit.xml
sonar.junit.reportPaths=test-results,junit.xml

# Generic test execution reports may be enabled if generated by CI:
# sonar.testExecutionReportPaths=reports/sonar-test-execution.xml


# ==============================================================================
# INCLUSIONS
# ==============================================================================
sonar.inclusions=\
  data/**/*.py

sonar.test.inclusions=\
  tests/**/*.py,\
  **/test_*.py,\
  **/*_test.py


# ==============================================================================
# EXCLUSIONS - GENERATED / LOCAL / NON-SOURCE
# ==============================================================================
sonar.exclusions=\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/.mypy_cache/**,\
  **/.ruff_cache/**,\
  **/.tox/**,\
  **/.nox/**,\
  **/.venv/**,\
  **/venv/**,\
  **/env/**,\
  **/build/**,\
  **/dist/**,\
  **/*.egg-info/**,\
  **/htmlcov/**,\
  **/coverage_reports/**,\
  **/test-results/**,\
  **/reports/**,\
  **/logs/**,\
  **/tmp/**,\
  **/temp/**,\
  **/storage/**,\
  **/warehouse/**,\
  **/data_lake/**,\
  **/lakehouse/**,\
  **/checkpoints/**,\
  **/dead_letter/**,\
  **/quarantine/**,\
  **/backups/**,\
  **/exports/**,\
  **/imports/**,\
  **/raw/**,\
  **/processed/**,\
  **/curated/**,\
  **/archive/**,\
  **/.ipynb_checkpoints/**,\
  **/notebook_output/**,\
  **/node_modules/**,\
  **/.terraform/**,\
  **/.serverless/**,\
  **/.aws-sam/**,\
  **/site/**,\
  **/docs/**,\
  **/examples/**,\
  **/samples/**,\
  **/migrations/versions/**,\
  **/*_pb2.py,\
  **/*_pb2_grpc.py,\
  **/generated/**,\
  **/vendor/**


# ==============================================================================
# COVERAGE EXCLUSIONS
# ==============================================================================
sonar.coverage.exclusions=\
  tests/**,\
  **/test_*.py,\
  **/*_test.py,\
  **/conftest.py,\
  **/__init__.py,\
  **/setup.py,\
  setup.py,\
  **/cli.py,\
  **/migrations/**,\
  **/examples/**,\
  **/samples/**,\
  **/docs/**,\
  **/generated/**,\
  **/vendor/**


# ==============================================================================
# COPY-PASTE / DUPLICATION EXCLUSIONS
# ==============================================================================
sonar.cpd.exclusions=\
  tests/**,\
  **/migrations/**,\
  **/examples/**,\
  **/samples/**,\
  **/generated/**,\
  **/vendor/**,\
  **/__init__.py


# ==============================================================================
# ISSUE IGNORE CRITERIA
# ------------------------------------------------------------------------------
# Use sparingly. Prefer fixing the issue or marking local false positives.
# These examples suppress common false positives in enterprise data code.
# ==============================================================================

# Example: allow TODO comments in tests only.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1135
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**/*.py

# Example: allow print statements in local smoke examples guarded by __main__.
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S106
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py

# Example: allow long files in enterprise modules where datamodels/config are centralized.
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S104
sonar.issue.ignore.multicriteria.e3.resourceKey=data/**/*.py

# Example: allow complex methods in quality engines after review; CI should still enforce linting.
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=data/quality/**/*.py


# ==============================================================================
# QUALITY GATE / ANALYSIS BEHAVIOR
# ==============================================================================
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
sonar.scm.provider=git
sonar.scm.exclusions.disabled=false
sonar.links.homepage=https://example.com/data-platform
sonar.links.ci=https://example.com/ci/data-platform
sonar.links.issue=https://example.com/issues/data-platform
sonar.links.scm=https://example.com/scm/data-platform


# ==============================================================================
# SECURITY / SECRETS NOTES
# ------------------------------------------------------------------------------
# Sonar detects many hardcoded secrets automatically.
# Keep .env, credentials and local config excluded from source analysis.
# ==============================================================================
sonar.secretDetection.enabled=true


# ==============================================================================
# BRANCH / PULL REQUEST ANALYSIS
# ------------------------------------------------------------------------------
# CI/CD should set these dynamically when needed:
#
# Pull Request:
#   sonar.pullrequest.key=${PR_NUMBER}
#   sonar.pullrequest.branch=${PR_BRANCH}
#   sonar.pullrequest.base=${PR_BASE}
#
# Branch:
#   sonar.branch.name=${BRANCH_NAME}
# ==============================================================================


# ==============================================================================
# ADDITIONAL REPORT IMPORTS
# ------------------------------------------------------------------------------
# Uncomment if your CI produces these reports.
# ==============================================================================
# sonar.python.pylint.reportPaths=reports/pylint-report.txt
# sonar.python.bandit.reportPaths=reports/bandit-report.json
# sonar.externalIssuesReportPaths=reports/sonar-external-issues.json


# ==============================================================================
# ANALYSIS PERFORMANCE
# ==============================================================================
sonar.scanner.metadataFilePath=.scannerwork/report-task.txt
sonar.log.level=INFO
sonar.verbose=false


# ==============================================================================
# ENTERPRISE TAGS / METADATA
# ==============================================================================
sonar.projectBaseDir=.
sonar.working.directory=.scannerwork
